name: Malachite Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel source branch'
        required: true
        default: 'malachite-u-oss'
        type: string
      kernel_version:
        description: 'Kernel version tag (e.g., v6.1.170)'
        required: false
        default: ''
        type: string
      with_kernelsu:
        description: 'Integrate KernelSU'
        required: true
        default: true
        type: boolean
      release:
        description: 'Create GitHub Release'
        required: true
        default: true
        type: boolean

env:
  ARCH: arm64
  SUBARCH: arm64
  DEVICE: malachite
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  MODULES_REPO: https://github.com/MiCode/MTK_kernel_modules.git
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
  CLANG_REPO: https://github.com/llvm/llvm-project.git
  CLANG_BRANCH: release/17.x
  CLANG_VERSION: 17

jobs:
  build-kernel:
    name: Build Malachite Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ============================================
      # Step 1: Free up disk space
      # ============================================
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # ============================================
      # Step 2: Install dependencies
      # ============================================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             git-core gnupg flex bison build-essential zip curl             zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386             libncurses5 lib32ncurses5-dev x11proto-core-dev             libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils             xsltproc unzip fontconfig python3 python3-pip bc             ccache libssl-dev ninja-build cmake cpio kmod             libelf-dev device-tree-compiler

          # Setup ccache
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          ccache -M 5G
          ccache -s

      # ============================================
      # Step 3: Clone kernel source
      # ============================================
      - name: Clone Xiaomi kernel source
        run: |
          git clone --depth=1 -b ${{ inputs.kernel_branch }}             ${{ env.KERNEL_REPO }} kernel
          cd kernel
          echo "KERNEL_PATH=${{ github.workspace }}/kernel" >> $GITHUB_ENV
          echo "Current kernel version:"
          make kernelversion

      # ============================================
      # Step 4: Merge stable kernel (if specified)
      # ============================================
      - name: Merge Linux stable (optional)
        if: inputs.kernel_version != ''
        run: |
          cd kernel
          git remote add stable https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
          git fetch stable --depth=1 tag ${{ inputs.kernel_version }}
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git merge ${{ inputs.kernel_version }} --no-edit || {
            echo "::warning::Merge conflicts detected. Attempting to resolve..."
            # Keep Xiaomi drivers, accept stable for core kernel
            git checkout --ours drivers/misc/mediatek/ || true
            git add drivers/misc/mediatek/ || true
            git commit --no-edit || true
          }
          echo "Updated kernel version:"
          make kernelversion

      # ============================================
      # Step 5: Clone MTK kernel modules
      # ============================================
      - name: Clone MTK kernel modules
        run: |
          git clone --depth=1 -b ${{ inputs.kernel_branch }}             ${{ env.MODULES_REPO }} mtk_modules
          echo "MODULES_PATH=${{ github.workspace }}/mtk_modules" >> $GITHUB_ENV

      # ============================================
      # Step 6: Setup Clang toolchain
      # ============================================
      - name: Setup Clang toolchain
        run: |
          # Download prebuilt AOSP Clang
          mkdir -p toolchain
          cd toolchain

          # Use AOSP Clang r487747c (Android 14/15 compatible)
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz"
          wget -q --show-progress "$CLANG_URL" -O clang.tar.gz
          tar -xzf clang.tar.gz
          rm clang.tar.gz

          CLANG_BIN="${{ github.workspace }}/toolchain/clang-r487747c/bin"
          echo "CLANG_BIN=$CLANG_BIN" >> $GITHUB_ENV
          echo "PATH=$CLANG_BIN:$PATH" >> $GITHUB_ENV

          # Verify
          $CLANG_BIN/clang --version

      # ============================================
      # Step 7: Setup GCC toolchain (for compatibility)
      # ============================================
      - name: Setup GCC toolchain
        run: |
          mkdir -p gcc
          cd gcc

          # AOSP GCC 4.9 for aarch64
          GCC_URL="https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz"
          wget -q --show-progress "$GCC_URL" -O gcc.tar.gz
          tar -xzf gcc.tar.gz
          rm gcc.tar.gz

          echo "GCC_PATH=${{ github.workspace }}/gcc" >> $GITHUB_ENV

      # ============================================
      # Step 8: Integrate KernelSU (optional)
      # ============================================
      - name: Integrate KernelSU
        if: inputs.with_kernelsu
        run: |
          cd kernel
          # Clone KernelSU
          git clone https://github.com/tiann/KernelSU.git KernelSU
          cd KernelSU
          git checkout main

          # Setup KernelSU in kernel
          cd ../
          # Apply KernelSU patch
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

          echo "KERNELSU_ENABLED=true" >> $GITHUB_ENV
          echo "::notice::KernelSU integrated successfully"

      # ============================================
      # Step 9: Configure kernel build
      # ============================================
      - name: Configure kernel
        run: |
          cd kernel

          export PATH="${{ env.CLANG_BIN }}:${{ env.GCC_PATH }}/bin:$PATH"
          export CC="${{ env.CLANG_BIN }}/clang"
          export CXX="${{ env.CLANG_BIN }}/clang++"
          export CROSS_COMPILE="${{ env.GCC_PATH }}/bin/aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="${{ env.GCC_PATH }}/bin/arm-linux-androideabi-"

          # Generate defconfig
          make O=out ARCH=arm64 gki_defconfig

          # Enable additional configs for Malachite
          cat >> out/.config << 'EOF'
          CONFIG_MTK_PLATFORM="mt6878"
          CONFIG_ARCH_MEDIATEK=y
          CONFIG_MTK_CPU_SUSPEND_EN=y
          CONFIG_MTK_IRQ_NEW_DESIGN=y
          CONFIG_MTK_PSCI=y
          CONFIG_MTK_SCHED_RQ_AVG_KS=y
          CONFIG_MTK_FREQ_HOPPING=y
          CONFIG_MTK_GPU_SUPPORT=y
          CONFIG_MALI_BIFROST=y
          CONFIG_MALI_MIDGARD=y
          CONFIG_MTK_CONN_LTE_IDC_SUPPORT=y
          CONFIG_MTK_COMBO_CHIP_MT6631=y
          CONFIG_LOCALVERSION="-Malachite-Custom"
          EOF

          # Update config
          make O=out ARCH=arm64 olddefconfig

          echo "::notice::Kernel configuration complete"

      # ============================================
      # Step 10: Build kernel
      # ============================================
      - name: Build kernel
        run: |
          cd kernel

          export PATH="${{ env.CLANG_BIN }}:${{ env.GCC_PATH }}/bin:$PATH"
          export CC="${{ env.CLANG_BIN }}/clang"
          export CXX="${{ env.CLANG_BIN }}/clang++"
          export CROSS_COMPILE="${{ env.GCC_PATH }}/bin/aarch64-linux-android-"
          export CROSS_COMPILE_ARM32="${{ env.GCC_PATH }}/bin/arm-linux-androideabi-"
          export LD="${{ env.CLANG_BIN }}/ld.lld"
          export AR="${{ env.CLANG_BIN }}/llvm-ar"
          export NM="${{ env.CLANG_BIN }}/llvm-nm"
          export OBJCOPY="${{ env.CLANG_BIN }}/llvm-objcopy"
          export OBJDUMP="${{ env.CLANG_BIN }}/llvm-objdump"
          export STRIP="${{ env.CLANG_BIN }}/llvm-strip"

          # Build with ccache
          export CCACHE_COMPRESS=1
          export CCACHE_DIR="${{ github.workspace }}/.ccache"

          # Start build
          make -j$(nproc) O=out ARCH=arm64             CC="ccache $CC"             CXX="$CXX"             CROSS_COMPILE="$CROSS_COMPILE"             CROSS_COMPILE_ARM32="$CROSS_COMPILE_ARM32"             LD="$LD" AR="$AR" NM="$NM"             OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" STRIP="$STRIP"             2>&1 | tee build.log

          # Check build result
          if [ ! -f out/arch/arm64/boot/Image.gz ]; then
            echo "::error::Kernel build failed!"
            tail -n 100 build.log
            exit 1
          fi

          echo "::notice::Kernel build successful!"
          ls -lh out/arch/arm64/boot/

      # ============================================
      # Step 11: Build MTK kernel modules
      # ============================================
      - name: Build MTK modules
        run: |
          cd mtk_modules

          export KERNEL_SRC="${{ github.workspace }}/kernel"
          export PATH="${{ env.CLANG_BIN }}:${{ env.GCC_PATH }}/bin:$PATH"
          export CC="${{ env.CLANG_BIN }}/clang"
          export CROSS_COMPILE="${{ env.GCC_PATH }}/bin/aarch64-linux-android-"

          # Build modules
          make -j$(nproc)             KERNEL_SRC="$KERNEL_SRC"             CC="$CC"             CROSS_COMPILE="$CROSS_COMPILE"             2>&1 | tee modules_build.log

          echo "::notice::MTK modules build complete"

      # ============================================
      # Step 12: Package with AnyKernel3
      # ============================================
      - name: Package with AnyKernel3
        run: |
          # Clone AnyKernel3
          git clone --depth=1 ${{ env.ANYKERNEL_REPO }} anykernel
          cd anykernel

          # Copy kernel image
          cp ${{ github.workspace }}/kernel/out/arch/arm64/boot/Image.gz .

          # Copy dtb/dtbo if present
          if [ -f ${{ github.workspace }}/kernel/out/arch/arm64/boot/dts/mediatek/mt6878.dtb ]; then
            cp ${{ github.workspace }}/kernel/out/arch/arm64/boot/dts/mediatek/mt6878.dtb .
          fi

          if [ -f ${{ github.workspace }}/kernel/out/arch/arm64/boot/dtbo.img ]; then
            cp ${{ github.workspace }}/kernel/out/arch/arm64/boot/dtbo.img .
          fi

          # Copy kernel modules
          mkdir -p modules
          find ${{ github.workspace }}/mtk_modules -name "*.ko" -exec cp {} modules/ \;
          find ${{ github.workspace }}/kernel/out -name "*.ko" -exec cp {} modules/ \;

          # Update anykernel.sh for Malachite
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers

          ## AnyKernel setup
          # begin properties
          properties() {           kernel.string=Malachite Custom Kernel by GitHub Actions;           do.devicecheck=1;           do.modules=1;           do.systemless=1;           do.cleanup=1;           do.cleanuponabort=0;           device.name1=malachite;           device.name2=POCOX7;           device.name3=redmi_note_14_pro;           supported.versions=14 15;           supported.patchlevels=;           ;           }
          # end properties

          # shell variables
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;

          # import functions/variables and setup patching - see for reference (DO NOT REMOVE)
          . tools/ak3-core.sh;

          # boot install
          dump_boot;

          write_boot;
          ## end boot install
          EOF

          # Create zip
          ZIP_NAME="Malachite-Kernel-$(date +%Y%m%d)-$(git -C ${{ github.workspace }}/kernel rev-parse --short HEAD)"
          if [ "${{ inputs.with_kernelsu }}" = "true" ]; then
            ZIP_NAME="${ZIP_NAME}-KernelSU"
          fi
          ZIP_NAME="${ZIP_NAME}.zip"

          zip -r9 "$ZIP_NAME" * -x .git README.md

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=${{ github.workspace }}/anykernel/$ZIP_NAME" >> $GITHUB_ENV

          echo "::notice::Package created: $ZIP_NAME"

      # ============================================
      # Step 13: Upload artifacts
      # ============================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-artifacts
          path: |
            ${{ github.workspace }}/kernel/out/arch/arm64/boot/Image.gz
            ${{ github.workspace }}/kernel/out/arch/arm64/boot/Image
            ${{ github.workspace }}/kernel/build.log
            ${{ env.ZIP_PATH }}
          if-no-files-found: warn

      # ============================================
      # Step 14: Create GitHub Release
      # ============================================
      - name: Create Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.ZIP_PATH }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "malachite-${{ github.run_number }}"
          name: "Malachite Kernel Build #${{ github.run_number }}"
          body: |
            ## Malachite Custom Kernel Build

            **Device:** POCO X7 5G / Redmi Note 14 Pro 5G (malachite)
            **SoC:** MediaTek Dimensity 7300-Ultra (MT6878)
            **Kernel Version:** ${{ inputs.kernel_version || 'Stock' }}
            **KernelSU:** ${{ inputs.with_kernelsu && 'Enabled' || 'Disabled' }}
            **Build Date:** $(date -u +%Y-%m-%d %H:%M UTC)
            **Commit:** $(git -C ${{ github.workspace }}/kernel rev-parse --short HEAD)

            ### Installation
            1. Backup your current boot.img
            2. Flash via TWRP/OrangeFox or fastboot
            3. Wipe cache/dalvik

            ### Notes
            - GKI (Generic Kernel Image) device
            - Requires compatible vendor modules
            - Use at your own risk
          draft: false
          prerelease: true

      # ============================================
      # Step 15: Show build summary
      # ============================================
      - name: Build summary
        run: |
          echo "=========================================="
          echo "  Malachite Kernel Build Complete"
          echo "=========================================="
          echo "Kernel Version: $(cd kernel && make kernelversion)"
          echo "Build Date: $(date)"
          echo "KernelSU: ${{ inputs.with_kernelsu }}"
          echo "Output: ${{ env.ZIP_NAME }}"
          echo "=========================================="
          ccache -s
          
